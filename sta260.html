<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STA260 | Hamza S</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0c0c0e;
      --surface: #141418;
      --surface-hover: #1c1c22;
      --border: #27272e;
      --border-hover: #3a3a45;
      --text: #e8e6e3;
      --text-muted: #8a8a96;
      --accent: #c9a96e;
      --accent-dim: rgba(201, 169, 110, 0.12);
      --accent-glow: rgba(201, 169, 110, 0.06);
      --radius: 10px;
      --transition: 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
    }

    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      z-index: 1000;
    }

    .container {
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 28px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 48px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      text-decoration: none;
      transition: color var(--transition);
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
      animation-delay: 0.1s;
    }

    .back-link:hover {
      color: var(--accent);
    }

    .back-link svg {
      width: 16px;
      height: 16px;
      transition: transform var(--transition);
    }

    .back-link:hover svg {
      transform: translateX(-3px);
    }

    header {
      padding: 32px 0 48px;
    }

    .header-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 14px;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
      animation-delay: 0.15s;
    }

    h1 {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(40px, 6vw, 56px);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.5px;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
      animation-delay: 0.2s;
    }

    h1 span {
      color: var(--accent);
      font-style: italic;
    }

    .header-desc {
      margin-top: 14px;
      font-size: 16px;
      color: var(--text-muted);
      max-width: 520px;
      line-height: 1.7;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
      animation-delay: 0.3s;
    }

    .divider {
      height: 1px;
      background: var(--border);
      opacity: 0;
      animation: fadeIn 0.5s ease forwards;
      animation-delay: 0.35s;
    }

    section {
      padding: 48px 0;
    }

    .section-header {
      display: flex;
      align-items: baseline;
      gap: 14px;
      margin-bottom: 24px;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
    }

    .section-notes .section-header { animation-delay: 0.4s; }
    .section-tests .section-header { animation-delay: 0.5s; }

    .section-header h2 {
      font-family: 'Instrument Serif', serif;
      font-size: 28px;
      font-weight: 400;
      letter-spacing: -0.3px;
    }

    .section-header .tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-dim);
      padding: 3px 10px;
      border-radius: 4px;
    }

    .pdf-open {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      text-decoration: none;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 9px 18px;
      border-radius: 8px;
      margin-bottom: 20px;
      transition: all var(--transition);
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
      animation-delay: 0.45s;
    }

    .pdf-open:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-glow);
    }

    .pdf-open svg {
      width: 14px;
      height: 14px;
    }

    .pdf-container {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--surface);
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
      animation-delay: 0.5s;
    }

    .pdf-container iframe {
      width: 100%;
      height: 850px;
      border: none;
      display: block;
    }

    .test-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
      animation-delay: 0.55s;
    }

    .test-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 22px;
      text-decoration: none;
      transition: all var(--transition);
    }

    .test-item:hover {
      border-color: var(--border-hover);
      background: var(--surface-hover);
      transform: translateX(4px);
    }

    .test-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .test-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      color: var(--accent);
      background: var(--accent-dim);
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
    }

    .test-label {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
    }

    .test-arrow {
      color: var(--text-muted);
      transition: all var(--transition);
    }

    .test-item:hover .test-arrow {
      color: var(--accent);
      transform: translateX(3px);
    }

    .test-arrow svg {
      width: 16px;
      height: 16px;
    }

    footer {
      padding: 36px 0 50px;
      border-top: 1px solid var(--border);
      text-align: center;
    }

    footer p {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }

    footer p a {
      color: var(--accent);
      text-decoration: none;
      transition: opacity var(--transition);
    }

    footer p a:hover {
      opacity: 0.75;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @media (max-width: 640px) {
      header { padding: 24px 0 36px; }
      section { padding: 36px 0; }
      .pdf-container iframe { height: 500px; }
    }
  </style>
</head>
<body>
  <div class="container">

    <a class="back-link" href="index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Back to Home
    </a>

    <header>
      <div class="header-eyebrow">Probability and Statistics II</div>
      <h1>STA<span>260</span></h1>
      <p class="header-desc">Full course notes and past tests completed by me — typeset in LaTeX.</p>
    </header>

    <div class="divider"></div>

    <section class="section-notes">
      <div class="section-header">
        <h2>Course Notes</h2>
        <span class="tag">PDF</span>
      </div>
      <a class="pdf-open" href="files/sta260/sta260-notes.pdf" target="_blank">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        Open in new tab
      </a>
      <div class="pdf-container">
        <iframe src="files/sta260/sta260-notes.pdf"></iframe>
      </div>
    </section>

    <div class="divider"></div>

    <section class="section-tests">
      <div class="section-header">
        <h2>Past Tests</h2>
        <span class="tag">3 files</span>
      </div>
      <div class="test-list">

        <a class="test-item" href="files/sta260/past-tests/test-1.pdf" target="_blank">
          <div class="test-left">
            <span class="test-num">01</span>
            <span class="test-label">Past Test 1</span>
          </div>
          <span class="test-arrow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </span>
        </a>

        <a class="test-item" href="files/sta260/past-tests/test-2.pdf" target="_blank">
          <div class="test-left">
            <span class="test-num">02</span>
            <span class="test-label">Past Test 2</span>
          </div>
          <span class="test-arrow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </span>
        </a>

        <a class="test-item" href="files/sta260/past-tests/test-3.pdf" target="_blank">
          <div class="test-left">
            <span class="test-num">03</span>
            <span class="test-label">Past Test 3</span>
          </div>
          <span class="test-arrow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </span>
        </a>

      </div>
    </section>

    <footer>
      <p><a href="index.html">Hamza S</a> · STA260 · 2026</p>
    </footer>

  </div>
</body>
</html>
